
name: Accept PR and Merge

on:
  pull_request:
    types: [opened, ready_for_review]
    branches:
      - clear-project2

permissions:
  pull-requests: write
  contents: write
  
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.ref == 'clear-project' && github.event.pull_request.base.ref == 'clear-project2'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check if PR is from branch clear-project
        id: check_source
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          if [ "$SOURCE_BRANCH" == "clear-project" ]; then
            echo "pr_from_a=true" >> $GITHUB_OUTPUT
          else
            echo "pr_from_a=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for merge conflicts
        if: steps.check_source.outputs.pr_from_a == 'true'
        id: check_conflicts
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          
          git fetch origin $BASE_BRANCH
          git fetch origin $HEAD_BRANCH
          
          if git merge-base --is-ancestor origin/$HEAD_BRANCH origin/$BASE_BRANCH; then
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ No conflicts detected"
          else
            # Try a test merge to detect conflicts
            if git merge-base --is-ancestor origin/$BASE_BRANCH origin/$HEAD_BRANCH; then
              echo "has_conflicts=false" >> $GITHUB_OUTPUT
            else
              # Attempt a dry-run merge
              git checkout origin/$BASE_BRANCH 2>/dev/null || true
              if git merge --no-commit --no-ff origin/$HEAD_BRANCH 2>/dev/null; then
                echo "has_conflicts=false" >> $GITHUB_OUTPUT
                git merge --abort
              else
                echo "has_conflicts=true" >> $GITHUB_OUTPUT
                git merge --abort 2>/dev/null || true
                echo "⚠️ Merge conflicts detected - PR will not be auto-merged"
              fi
            fi
          fi
      - name: Auto-merge PR
        if: steps.check_source.outputs.pr_from_a == 'true' && steps.check_conflicts.outputs.has_conflicts == 'false'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   

      - name: Comment on PR if conflicts detected
        if: steps.check_source.outputs.pr_from_a == 'true' && steps.check_conflicts.outputs.has_conflicts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Auto-merge failed**: This PR has merge conflicts. Please resolve them manually before merging.'
            })
