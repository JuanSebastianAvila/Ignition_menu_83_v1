name: Auto PR e Merge su tbr_3

on:
  push:
    branches:
      - script_ste

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Aspetta che il lint passi
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: "lint-python"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Crea PR e merge su tbr_3
        run: |
          PR_URL=$(gh pr create \
            --base tbr_3 \
            --head script_ste \
            --title "Auto PR da script_ste" \
            --body "PR creata automaticamente dopo push su script_ste")
          echo "PR creata: $PR_URL"
          gh pr merge $PR_URL --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
