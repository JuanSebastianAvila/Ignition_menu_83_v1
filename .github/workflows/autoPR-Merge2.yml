
name: Accept PR and Merge test2

on:
  pull_request:
    types: [opened, ready_for_review]
    branches:
      - clear-project2
  
  workflow_dispatch:
  
permissions:
  pull-requests: write
  contents: write
  
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.ref == 'clear-project3'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check if PR is from branch clear-project
        id: check_source
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          
          if [[ "$SOURCE_BRANCH" == "clear-project" || "$SOURCE_BRANCH" == "clear-project3" ]]; then
            echo "pr_from_a=true" >> $GITHUB_OUTPUT
          else
            echo "pr_from_a=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for merge conflicts
        if: steps.check_source.outputs.pr_from_a == 'true'
        id: check_conflicts
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          git checkout origin/${{ github.event.pull_request.base.ref }}
          
          if git merge --no-commit --no-ff origin/${{ github.event.pull_request.head.ref }}; then
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ No conflicts detected"
            git merge --abort 2>/dev/null || true
          else
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "Real conflicts detected"
            git merge --abort 2>/dev/null || true
          fi
          
      - name: Auto-merge PR
        if: steps.check_source.outputs.pr_from_a == 'true' && steps.check_conflicts.outputs.has_conflicts == 'false'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   

      - name: Comment on PR if conflicts detected
        if: steps.check_source.outputs.pr_from_a == 'true' && steps.check_conflicts.outputs.has_conflicts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Auto-merge failed**: This PR has merge conflicts. Please resolve them manually before merging.'
            })
