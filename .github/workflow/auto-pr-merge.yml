name: Auto PR e Merge su tbr_3

on:
  push:
    branches:
      - script_ste

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v3

      - name: Aspetta che il lint passi
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: "lint-python"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Apri PR verso tbr_3
        id: cpr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "script_ste"
          destination_branch: "tbr_3"
          pr_title: "Auto PR da script_ste"
          pr_body: "PR creata automaticamente dopo push su script_ste"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge automatico della PR
        if: steps.cpr.outputs.pr_number != ''
        run: |
          gh pr merge ${{ steps.cpr.outputs.pr_number }} \
            --merge \
            --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}